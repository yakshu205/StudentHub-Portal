<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudentHub Registration</title>
</head>

<body>

<center>

    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcS_msVTJ1UZqmtO-rMykxXBRws_5_EmYQxh7ZsTVTWeQoeh8BjRmlV7sLk&s=10"
        width="150" alt="StudentHub Logo">

    <h1>StudentHub Portal</h1>
    <h3>Create Your Account</h3>

    <p>
        Already have an account?
        <a href="login.html">Login Here</a>
    </p>

</center>

<hr>

<form>

<center>

<fieldset style="width:500px;">
    <legend><b>Registration Form</b></legend>

<table cellpadding="8">

<tr>
    <td><label for="name">Full Name</label></td>
    <td><input type="text" id="name" placeholder="Enter Full Name" required></td>
</tr>

<tr>
    <td><label for="email">Email</label></td>
    <td><input type="email" id="email" placeholder="Enter Email" required></td>
</tr>

<tr>
    <td><label for="mobile">Mobile</label></td>
    <td><input type="tel" id="mobile" placeholder="Enter Mobile Number" required></td>
</tr>

<tr>
    <td><label for="password">Password</label></td>
    <td><input type="password" id="password" placeholder="Enter Password" required></td>
</tr>

<tr>
    <td><label for="confirm">Confirm Password</label></td>
    <td><input type="password" id="confirm" placeholder="Confirm Password" required></td>
</tr>

<tr>
    <td><label for="dob">Date of Birth</label></td>
    <td><input type="date" id="dob" required></td>
</tr>

<tr>
    <td>⚧ Gender</td>
    <td>
        <input type="radio" name="gender" id="male">
        <label for="male">Male</label>

        <input type="radio" name="gender" id="female">
        <label for="female">Female</label>

        <input type="radio" name="gender" id="other">
        <label for="other">Other</label>
    </td>
</tr>

<tr>
    <td><label for="course">Course</label></td>
    <td>
        <select id="course">
            <option>Select Course</option>
            <option>B.Tech CSE</option>
            <option>B.Tech CE</option>
            <option>B.Tech IT</option>
        </select>
    </td>
</tr>

<tr>
    <td>Skills</td>
    <td>
        <input type="checkbox"> C
        <input type="checkbox"> C++
        <input type="checkbox"> Java
        <input type="checkbox"> Python
    </td>
</tr>

<tr>
    <td><label for="address">Address</label></td>
    <td>
        <textarea id="address" rows="3" cols="25"
            placeholder="Enter Your Address"></textarea>
    </td>
</tr>

<tr>
    <td colspan="2" align="center">
        <input type="checkbox" required>
        I agree to the Terms & Conditions
    </td>
</tr>

<tr>
    <td colspan="2" align="center">
        <button type="submit">Register</button>
        &nbsp;&nbsp;
        <button type="reset">Clear</button>
    </td>
</tr>

</table>

</fieldset>

</center>

</form>

<hr>

<center>
    <small>© 2026 StudentHub Portal | All Rights Reserved</small>
</center>

</body>
</html>
