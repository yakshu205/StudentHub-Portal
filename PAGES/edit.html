<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Profile</title>
</head>
<body>

    <h1 align="center"> Edit Profile</h1>
    <form>

        <table cellpadding="8">

            <tr>
                <td>Full Name : </td>
                <td>
                    <input type="text" value="Krish Varsani">
                </td>
            </tr>

            <tr>
                <td>Student ID : </td>
                <td>
                    <input type="text" value="25DCS140" readonly>
                </td>
            </tr>

            <tr>
                <td>Email : </td>
                <td>
                    <input type="email" value="krish@gmail.com">
                </td>
            </tr>

            <tr>
                <td>Phone Number :</td>
                <td>
                    <input type="tel" value="+91 9876543210">
                </td>
            </tr>

            <tr>
                <td>Department : </td>
                <td>
                    <select>
                        <option selected>Computer Science</option>
                        <option>Computer Engineering</option>
                        <option>Information Technology</option>
                        <option>Electronics</option>
                        <option>Mechanical</option>
                    </select>
                </td>
            </tr>

            <tr>
                <td>Semester : </td>
                <td>
                    <select>
                        <option selected>1</option>
                        <option>2</option>
                        <option>3</option>
                        <option>4</option>
                        <option>5</option>
                        <option>6</option>
                        <option>7</option>
                        <option>8</option>
                    </select>
                </td>
            </tr>

            <tr>
                <td>Gender : </td>
                <td>
                    <input type="radio" name="gender"> Male
                    <input type="radio" name="gender"> Female
                </td>
            </tr>

            <tr>
                <td>Date of Birth : </td>
                <td>
                    <input type="date">
                </td>
            </tr>

            <tr>
                <td>Address :</td>
                <td>
                    <textarea rows="4" cols="30">Anand, Gujarat</textarea>
                </td>
            </tr>

            <tr>
                <td>Upload Photo : </td>
                <td>
                    <input type="file">
                </td>
            </tr>

            <tr>
                <td colspan="2" align="center"><br>
                    <input type="submit" value="Save Changes"><br><br>
                    <input type="reset" value="Reset">
                </td>
            </tr>

        </table>

    </form>
    <br>

        <a href="profile.html"> Back to Profile</a>

</body>
</html>
